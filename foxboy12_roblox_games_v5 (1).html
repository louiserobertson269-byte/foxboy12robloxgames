<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Foxboy12 Roblox Games</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:#0d0d0d;color:#f0f0f0;min-height:100vh;}
.topbar{position:fixed;top:0;right:0;z-index:100;padding:14px 20px;}
.suggest-btn{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(192,132,252,0.12);
  border:1px solid rgba(192,132,252,0.4);
  color:#c084fc;
  font-family:'Inter',sans-serif;
  font-size:13px;font-weight:600;
  padding:9px 18px;border-radius:999px;
  cursor:pointer;text-decoration:none;
  backdrop-filter:blur(8px);
  transition:background 0.18s,border-color 0.18s,transform 0.15s,box-shadow 0.18s;
  white-space:nowrap;
}
.suggest-btn:hover{
  background:rgba(192,132,252,0.22);
  border-color:rgba(192,132,252,0.7);
  transform:translateY(-1px);
  box-shadow:0 4px 16px rgba(192,132,252,0.25);
}
.suggest-btn svg{width:14px;height:14px;fill:#c084fc;flex-shrink:0;}
.hero{background:linear-gradient(135deg,#1a0a2e 0%,#0d1a3a 50%,#0a2a1a 100%);padding:48px 24px 36px;text-align:center;border-bottom:1px solid rgba(255,255,255,0.08);position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;top:-60px;left:50%;transform:translateX(-50%);width:400px;height:400px;background:radial-gradient(circle,rgba(120,60,255,0.15) 0%,transparent 70%);pointer-events:none;}
.hero-logo{width:100px;height:100px;object-fit:contain;display:block;margin:0 auto 16px;filter:drop-shadow(0 0 16px rgba(41,182,246,0.5));}
.hero h1{font-size:32px;font-weight:700;background:linear-gradient(90deg,#c084fc,#60a5fa,#34d399);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px;}
.hero p{color:rgba(255,255,255,0.55);font-size:15px;}
.game-count{display:inline-block;margin-top:14px;background:rgba(192,132,252,0.15);border:1px solid rgba(192,132,252,0.3);color:#c084fc;font-size:13px;font-weight:500;padding:5px 14px;border-radius:20px;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:20px;padding:32px 24px;max-width:1200px;margin:0 auto;}
.card{background:#161616;border:1px solid rgba(255,255,255,0.08);border-radius:14px;overflow:hidden;transition:transform 0.18s ease,border-color 0.18s ease,box-shadow 0.18s ease;cursor:pointer;text-decoration:none;display:block;color:inherit;}
.card:hover{transform:translateY(-4px);border-color:rgba(192,132,252,0.4);box-shadow:0 8px 32px rgba(0,0,0,0.4);}
.thumb-wrap{width:100%;aspect-ratio:16/9;background:#1a1a2e;overflow:hidden;position:relative;}
.thumb-wrap img{width:100%;height:100%;object-fit:cover;display:block;}
.thumb-fallback{position:absolute;inset:0;display:none;align-items:center;justify-content:center;background:linear-gradient(135deg,#1a1a2e,#16213e);font-size:36px;color:rgba(255,255,255,0.15);flex-direction:column;gap:8px;}
.thumb-fallback span{font-size:11px;color:rgba(255,255,255,0.2);}
.card-body{padding:14px 16px 16px;}
.card-title{font-size:14px;font-weight:600;color:#f0f0f0;margin-bottom:10px;line-height:1.35;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-footer{display:flex;align-items:center;justify-content:space-between;}
.rating-badge{font-size:11px;font-weight:600;padding:3px 9px;border-radius:6px;letter-spacing:0.03em;}
.r-minimal{background:rgba(52,211,153,0.15);color:#34d399;border:1px solid rgba(52,211,153,0.25);}
.r-mild{background:rgba(96,165,250,0.15);color:#60a5fa;border:1px solid rgba(96,165,250,0.25);}
.r-moderate{background:rgba(251,191,36,0.15);color:#fbbf24;border:1px solid rgba(251,191,36,0.25);}
.r-na{background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.4);border:1px solid rgba(255,255,255,0.1);}
.play-btn{font-size:11px;color:rgba(255,255,255,0.4);display:flex;align-items:center;gap:4px;}
.play-btn svg{width:14px;height:14px;fill:rgba(255,255,255,0.4);}
.footer{text-align:center;padding:24px;color:rgba(255,255,255,0.2);font-size:12px;border-top:1px solid rgba(255,255,255,0.05);margin-top:8px;}
</style>
